#--------------- 快捷键 ---------------
unbind C-b
set -g prefix C-M-S-b # 设置 prefix 为 caps lock + b

#-----------------------------------

set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g default-terminal "${TERM}"
# setw -g mode-keys vi

# 启用插件管理器 tpm
set -g @plugin 'tmux-plugins/tpm' # prefix + I 安装插件

# 启用 sensible 插件，提供一些有用的默认设置
set -g @plugin 'tmux-plugins/tmux-sensible'

#------------ Session 持久化 ------------
# 保存： 按 Prefix + Ctrl-s (Save)。你会看到状态栏显示 "Saved"。
# 恢复： 按 Prefix + Ctrl-r (Restore)。你会看到状态栏显示 "Restored"。
set -g @plugin 'tmux-plugins/tmux-resurrect' # 保存和恢复 session 的基础插件
set -g @plugin 'tmux-plugins/tmux-continuum' # 自动保存并自动启动（依赖 resurrect）

set -g @continuum-restore 'on' # 开启自动恢复 session
set -g @continuum-save-interval '15' # 设置自动保存间隔（单位：分钟）
set -g @resurrect-capture-pane-contents 'on' # (可选) 恢复面板内容（实验性）
#------------ ----------------------------


#---------------- 主题 (catppuccin/tmux v2) ------------
# https://github.com/catppuccin/tmux — 状态栏用 status-left/right 拼模块（非 v0 的 status_modules_*）
set -g @plugin 'catppuccin/tmux#v2.1.3'


set -g @catppuccin_flavor "mocha"

set -g @catppuccin_menu_selected_style "fg=#{@thm_fg},bold,bg=#{@thm_overlay_0}"

# windwos 窗口条样式
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag,(),}"

# 窗口条与透明状态栏对齐：底色用 default，避免中间出现深色矩形底（见 README）
set -g @catppuccin_window_text_color "default"
set -g @catppuccin_window_number_color "default"
set -g @catppuccin_window_current_text_color "default"
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"

# 状态栏：none = 与 tmux bg=default 一致，@_ctp_status_bg 为 none，rounded 与左右模块不打架
set -g @catppuccin_status_background "default"
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_connect_separator "no"

# 目录 / 时间文案（模块内会再包一层图标+底色，这里只设显示格式）
set -g @catppuccin_directory_text " #{b:pane_current_path}"
set -g @catppuccin_date_time_text " %a %y/%m/%d %H:%M"

# gitmux：需 brew install gitmux；配置由 `dotfiles theme apply` 写入 ~/.gitmux.conf
set -g status-interval 2

set -g status-left-length 100
set -g status-right-length 320
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_gitmux}#{E:@catppuccin_status_date_time}"

# 主题加载后再锁一次透明底；窗口列表区域避免 tmux 再铺默认色块
set -g status-style "bg=default"
set -g window-status-style "bg=default"
set -g window-status-current-style "bg=default"
#-----------------------------------

# ---------------------------- 浮动终端 ----------------------------
# 在 tmux 里提供一个 可开关的「浮动终端」弹层：
# 像一块盖在当前布局上的大窗口，用来临时跑命令，而不改你原来的分屏结构
set -g @plugin 'omerxx/tmux-floax'

set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-bind 'p'  # prifix + p 打开浮动终端, ctril +d 关闭浮动终端
set -g @floax-change-path 'true'
# ------------------------------------------------------------


set -g @plugin 'tmux-plugins/tmux-yank' # 在 tmux 里复制就像 Cmd+C 一样好用



# Theme integration (generated by theme system)
if-shell "test -f $DOTFILES_DIR/system/themes/generated/tmux-colors.conf" "source-file $DOTFILES_DIR/system/themes/generated/tmux-colors.conf"

run '~/.tmux/plugins/tpm/tpm'
