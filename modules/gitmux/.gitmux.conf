# Git status for tmux (gitmux). Symlinked to ~/.gitmux.conf via `stow tmux`.
# Catppuccin Mocha–style tmux format strings (see https://github.com/arl/gitmux )
tmux:
  symbols:
    branch: " "
    hashprefix: ":"
    ahead: "↑·"
    behind: "↓·"
    staged: "● "
    conflict: "✖ "
    modified: "✚ "
    untracked: "… "
    stashed: "⚑ "
    clean: "✔"
    insertions: Σ
    deletions: Δ
  styles:
    clear: "#[fg=#cdd6f4]"
    state: "#[fg=#f38ba8,bold]"
    branch: "#[fg=#cdd6f4,bold]"
    remote: "#[fg=#94e2d5]"
    divergence: "#[fg=#a6adc8]"
    staged: "#[fg=#a6e3a1,bold]"
    conflict: "#[fg=#f38ba8,bold]"
    modified: "#[fg=#f9e2af,bold]"
    untracked: "#[fg=#cba6f7,bold]"
    stashed: "#[fg=#89b4fa,bold]"
    clean: "#[fg=#a6e3a1,bold]"
    insertions: "#[fg=#a6e3a1]"
    deletions: "#[fg=#f38ba8]"
  layout: [branch, .., remote-branch, divergence, " - ", flags]
  options:
    branch_max_len: 0
    branch_trim: right
    ellipsis: …
    hide_clean: false
    swap_divergence: false
    divergence_space: false
